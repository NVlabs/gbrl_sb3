# Best Split-AWR GBRL config for MiniGrid-MultiRoomCorridor-v0
# Peak success: 65% at ~2M steps with lambda_objs=[0.5, 1, 1, 1, 1, 3]
# 6-objective: obj-0=pre-handoff AWR, objs 1-4=BC (expert), obj-5=post-handoff AWR
# Gated distance shaping (0.1 * dist_delta, gated on box_opened)
# Expert data: moveball(7629) + keydoor(17113) + boxkey(10247) = 34989 transitions

algo_type: split_awr_gbrl
env_type: minigrid
env_name: MiniGrid-MultiRoomCorridor-v0

# Training
total_n_steps: 5000000
num_envs: 1
device: cuda

# Multi-objective
n_objs: 6
lambda_objs: [0.5, 1.0, 1.0, 1.0, 1.0, 3.0]

# Expert datasets
expert_datasets:
  moveball: datasets/minigrid/moveball_expert.npz
  keydoor: datasets/minigrid/keydoor_expert.npz
  boxkey: datasets/minigrid/boxkey_expert.npz

# AWR hyperparameters
ent_coef: 0.5
buffer_size: 100000
batch_size: 1024
beta: 0.05
gradient_steps: 25
train_freq: 1500
vf_coef: 0.56
weights_max: 20

# GBRL tree parameters
max_depth: 6
n_bins: 250
grow_policy: oblivious
split_score_func: Cosine
generator_type: Quantile

# Learning rates
policy_lr: 0.007555963614448095
value_lr: 0.005157528445232975
fixed_std: false
log_std_lr: "lin_0.0017"
min_log_std_lr: 0.000475

